<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coloop-agent Web</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link id="theme-link" rel="stylesheet" href="themes/claude.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-theme-link">
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <style>
        /* Command Suggestions Overlay */
        .command-suggestions {
            position: absolute;
            bottom: 100%;
            left: 20px;
            right: 20px;
            max-height: 220px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ddd6fe;
            border-radius: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            margin-bottom: 6px;
            display: none;
            z-index: 100;
        }
        .command-suggestions.active {
            display: block;
        }
        .command-suggestion-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            gap: 10px;
            border-bottom: 1px solid #f3f4f6;
        }
        .command-suggestion-item:last-child {
            border-bottom: none;
        }
        .command-suggestion-item:hover,
        .command-suggestion-item.selected {
            background: #f5f3ff;
        }
        .command-suggestion-name {
            font-weight: 600;
            font-size: 13px;
            color: #4a306d;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
        }
        .command-suggestion-desc {
            font-size: 12px;
            color: #6b7280;
        }

        /* App layout override for sidebar */
        .app {
            flex-direction: row !important;
            max-width: none !important;
            margin: 0 !important;
            width: 100vw;
            height: 100vh;
        }

        /* Agent Sidebar - colors via CSS vars so themes can override */
        .agent-sidebar {
            width: 220px;
            min-width: 220px;
            background: var(--sidebar-bg, #f8f7fa);
            border-right: 1px solid var(--sidebar-border, #e5e2ec);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .agent-sidebar.collapsed {
            width: 52px;
            min-width: 52px;
        }
        .agent-sidebar-header {
            padding: 14px;
            border-bottom: 1px solid var(--sidebar-border, #e5e2ec);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            height: 52px;
        }
        .agent-sidebar.collapsed .agent-sidebar-header {
            padding: 14px 0;
            justify-content: center;
        }
        .agent-sidebar-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--sidebar-title-color, #4a306d);
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.15s ease, width 0.15s ease;
        }
        .agent-sidebar.collapsed .agent-sidebar-title {
            opacity: 0;
            width: 0;
        }
        .agent-sidebar-toggle {
            font-size: 13px;
            cursor: pointer;
            color: var(--sidebar-toggle-color, #8b7aa0);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
            flex-shrink: 0;
        }
        .agent-sidebar-toggle:hover {
            background: var(--sidebar-toggle-hover-bg, #e5e2ec);
            color: var(--sidebar-toggle-hover-color, #4a306d);
        }
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .agent-sidebar.collapsed .agent-list {
            padding: 8px 6px;
            align-items: center;
        }
        .agent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            line-height: 1.4;
            color: var(--sidebar-item-color, #555);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            position: relative;
            background: transparent;
        }
        .agent-item:hover {
            background: var(--sidebar-item-hover-bg, #ede9f7);
            color: var(--sidebar-item-hover-color, #4a306d);
        }
        .agent-item.active {
            background: var(--sidebar-item-active-bg, #f0ebfa);
            color: var(--sidebar-item-active-color, #4a306d);
            font-weight: 600;
            box-shadow: inset 3px 0 0 0 var(--sidebar-item-active-border, #8b5cf6);
        }
        .agent-sidebar.collapsed .agent-item {
            padding: 6px;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
        }
        .agent-sidebar.collapsed .agent-item.active {
            background: var(--sidebar-collapsed-active-bg, #8b5cf6);
            color: var(--sidebar-collapsed-active-color, #fff);
            box-shadow: none;
        }
        .agent-item.removing {
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .agent-icon {
            font-size: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--sidebar-icon-bg, #e8e5f0);
            transition: all 0.15s ease;
        }
        .agent-item.active .agent-icon {
            background: var(--sidebar-icon-active-bg, #ddd6fe);
        }
        .agent-sidebar.collapsed .agent-icon {
            width: 100%;
            height: 100%;
            background: transparent;
            font-size: 16px;
        }
        .agent-sidebar.collapsed .agent-item.active .agent-icon {
            background: transparent;
        }
        .agent-name {
            flex: 1;
            word-break: break-word;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: opacity 0.15s ease;
        }
        .agent-sidebar.collapsed .agent-name {
            display: none;
        }
        .agent-list::-webkit-scrollbar {
            width: 3px;
        }
        .agent-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .agent-list::-webkit-scrollbar-thumb {
            background: var(--sidebar-scrollbar, #d1cbe6);
            border-radius: 2px;
        }
        .sidebar-sections {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar-section {
            display: flex;
            flex-direction: column;
        }
        .sidebar-section-header {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--sidebar-section-header-color, #8b7aa0);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            user-select: none;
            transition: background 0.15s ease;
        }
        .sidebar-section-header:hover {
            background: var(--sidebar-section-header-hover-bg, #ede9f7);
        }
        .section-toggle {
            font-size: 10px;
            transition: transform 0.2s ease;
        }
        .sidebar-section.expanded .section-toggle {
            transform: rotate(0deg);
        }
        .sidebar-section:not(.expanded) .section-toggle {
            transform: rotate(-90deg);
        }
        .sidebar-section-body {
            display: flex;
            flex-direction: column;
            padding: 0 8px 8px;
            gap: 2px;
        }
        .sidebar-section-body.collapsed {
            display: none;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.4;
            color: var(--sidebar-history-item-color, #555);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: var(--sidebar-history-item-hover-bg, #ede9f7);
            color: var(--sidebar-history-item-hover-color, #4a306d);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="agent-sidebar" id="agent-sidebar">
            <div class="agent-sidebar-header">
                <span class="agent-sidebar-title">coloop</span>
                <span class="agent-sidebar-toggle" id="agent-sidebar-toggle" title="收起/展开">◀</span>
            </div>
            <div class="sidebar-sections">
                <div class="sidebar-section expanded" data-section="current">
                    <div class="sidebar-section-header">
                        <span class="section-toggle">▼</span>
                        <span class="section-title">当前会话</span>
                    </div>
                    <div class="sidebar-section-body" id="current-session-list">
                        <div class="agent-item active" data-agent="main">
                            <span class="agent-icon">⭐</span>
                            <span class="agent-name">main</span>
                        </div>
                    </div>
                </div>
                <div class="sidebar-section" data-section="history">
                    <div class="sidebar-section-header" id="history-section-header">
                        <span class="section-toggle">▶</span>
                        <span class="section-title">历史记录</span>
                    </div>
                    <div class="sidebar-section-body collapsed" id="history-list">
                    </div>
                </div>
            </div>
        </aside>
        <div class="main-content">
            <header class="header">
                <h1>coloop-agent Web</h1>
                <div class="header-right">
                    <div class="theme-switcher">
                        <label for="theme-select">主题</label>
                        <select id="theme-select">
                            <option value="claude">Claude 优雅紫</option>
                            <option value="chatgpt">ChatGPT 极简</option>
                            <option value="cursor">Cursor 极客暗</option>
                            <option value="discord">Discord 社交暗</option>
                            <option value="linear">Linear 专业白</option>
                            <option value="telegram">Telegram 明快</option>
                            <option value="terminal">终端复古</option>
                            <option value="glass">玻璃华丽</option>
                        </select>
                        <a href="theme-gallery.html">浏览全部</a>
                    </div>
                    <span id="connection-status" class="status connecting">连接中...</span>
                </div>
            </header>
            <div class="context-bar" id="context-bar">
                <div class="context-info">
                    <span class="context-label">上下文占用</span>
                    <span class="context-value" id="context-value">0 / 100K (0%)</span>
                </div>
                <div class="context-progress-bg">
                    <div class="context-progress-fill" id="context-progress-fill" style="width:0%"></div>
                </div>
            </div>
            <main class="chat-container" id="chat-container">
                <!-- 消息将动态插入这里 -->
            </main>
            <footer class="input-area" style="position:relative;">
                <div id="command-suggestions" class="command-suggestions"></div>
                <textarea id="message-input" placeholder="输入消息... (Shift+Enter 换行, Enter 发送)" rows="2"></textarea>
                <button id="send-btn" disabled>发送</button>
            </footer>
        </div>
    </div>

    <script src="chat.js?v=2"></script>
    <script>
        (function() {
            var themeLink = document.getElementById('theme-link');
            var hljsThemeLink = document.getElementById('hljs-theme-link');
            var themeSelect = document.getElementById('theme-select');
            var STORAGE_KEY = 'coloop-agent-theme';
            var DEFAULT_THEME = 'claude';

            var DARK_THEMES = ['cursor', 'discord', 'terminal', 'glass'];

            function isDarkTheme(themeName) {
                return DARK_THEMES.indexOf(themeName) !== -1;
            }

            function loadTheme(themeName) {
                themeName = themeName || localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
                themeLink.href = 'themes/' + themeName + '.css';
                if (themeSelect) themeSelect.value = themeName;
                // Sync highlight.js theme
                if (hljsThemeLink) {
                    var hljsTheme = isDarkTheme(themeName) ? 'github-dark' : 'github';
                    hljsThemeLink.href = 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/' + hljsTheme + '.min.css';
                }
            }

            if (themeSelect) {
                themeSelect.addEventListener('change', function() {
                    loadTheme(themeSelect.value);
                    localStorage.setItem(STORAGE_KEY, themeSelect.value);
                });
            }

            // Load saved theme on page load
            loadTheme();
        })();
    </script>
</body>
</html>
