<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coloop-agent Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link id="theme-link" rel="stylesheet" href="themes/claude.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-theme-link">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <style>
        /* Command Suggestions Overlay */
        .command-suggestions {
            position: absolute;
            bottom: 100%;
            left: 20px;
            right: 20px;
            max-height: 220px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #ddd6fe;
            border-radius: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            margin-bottom: 6px;
            display: none;
            z-index: 100;
        }
        .command-suggestions.active {
            display: block;
        }
        .command-suggestion-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            gap: 10px;
            border-bottom: 1px solid #f3f4f6;
        }
        .command-suggestion-item:last-child {
            border-bottom: none;
        }
        .command-suggestion-item:hover,
        .command-suggestion-item.selected {
            background: #f5f3ff;
        }
        .command-suggestion-name {
            font-weight: 600;
            font-size: 13px;
            color: #4a306d;
            font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
        }
        .command-suggestion-desc {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>coloop-agent Web</h1>
            <div class="header-right">
                <div class="theme-switcher">
                    <label for="theme-select">主题</label>
                    <select id="theme-select">
                        <option value="claude">Claude 优雅紫</option>
                        <option value="chatgpt">ChatGPT 极简</option>
                        <option value="cursor">Cursor 极客暗</option>
                        <option value="discord">Discord 社交暗</option>
                        <option value="linear">Linear 专业白</option>
                        <option value="telegram">Telegram 明快</option>
                        <option value="terminal">终端复古</option>
                        <option value="glass">玻璃华丽</option>
                    </select>
                    <a href="theme-gallery.html">浏览全部</a>
                </div>
                <span id="connection-status" class="status connecting">连接中...</span>
            </div>
        </header>
        <div class="context-bar" id="context-bar">
            <div class="context-info">
                <span class="context-label">上下文占用</span>
                <span class="context-value" id="context-value">0 / 100K (0%)</span>
            </div>
            <div class="context-progress-bg">
                <div class="context-progress-fill" id="context-progress-fill" style="width:0%"></div>
            </div>
        </div>
        <main class="chat-container" id="chat-container">
            <!-- 消息将动态插入这里 -->
        </main>
        <footer class="input-area" style="position:relative;">
            <div id="command-suggestions" class="command-suggestions"></div>
            <textarea id="message-input" placeholder="输入消息... (Shift+Enter 换行, Enter 发送)" rows="2"></textarea>
            <button id="send-btn" disabled>发送</button>
        </footer>
    </div>

    <script src="chat.js"></script>
    <script>
        (function() {
            var themeLink = document.getElementById('theme-link');
            var hljsThemeLink = document.getElementById('hljs-theme-link');
            var themeSelect = document.getElementById('theme-select');
            var STORAGE_KEY = 'coloop-agent-theme';
            var DEFAULT_THEME = 'claude';

            var DARK_THEMES = ['cursor', 'discord', 'terminal', 'glass'];

            function isDarkTheme(themeName) {
                return DARK_THEMES.indexOf(themeName) !== -1;
            }

            function loadTheme(themeName) {
                themeName = themeName || localStorage.getItem(STORAGE_KEY) || DEFAULT_THEME;
                themeLink.href = 'themes/' + themeName + '.css';
                if (themeSelect) themeSelect.value = themeName;
                // Sync highlight.js theme
                if (hljsThemeLink) {
                    var hljsTheme = isDarkTheme(themeName) ? 'github-dark' : 'github';
                    hljsThemeLink.href = 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/' + hljsTheme + '.min.css';
                }
            }

            if (themeSelect) {
                themeSelect.addEventListener('change', function() {
                    loadTheme(themeSelect.value);
                    localStorage.setItem(STORAGE_KEY, themeSelect.value);
                });
            }

            // Load saved theme on page load
            loadTheme();
        })();
    </script>
</body>
</html>
